<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shopping Cart</title>
</head>
<body>

  <h2>Shopping Cart</h2>

  <input type="text" id="item-name-input" placeholder="Item name" />
  <input type="number" id="item-price-input" placeholder="Price" min="0" step="0.01" />
  <button onclick="addItem()">Add</button>

  <p id="error" style="color:red;"></p>

  <table border="1" cellpadding="8" cellspacing="0">
    <thead>
      <tr>
        <th>Item</th>
        <th>Price</th>
      </tr>
    </thead>
    <tbody id="item-tbody"></tbody>
    <tfoot>
      <tr>
        <td><strong>Grand Total</strong></td>
        <td data-ns-test="grandTotal">0</td>
      </tr>
    </tfoot>
  </table>

  <script>
    var total = 0;

    function addItem() {
      var name = document.getElementById('item-name-input').value.trim();
      var price = parseFloat(document.getElementById('item-price-input').value);
      var error = document.getElementById('error');

      if (!name || isNaN(price) || price < 0) {
        error.textContent = 'Please enter a valid name and price.';
        return;
      }

      error.textContent = '';

      var row = document.getElementById('item-tbody').insertRow();
      row.insertCell(0).setAttribute('data-ns-test', 'item-name');
      row.cells[0].textContent = name;
      row.insertCell(1).setAttribute('data-ns-test', 'item-price');
      row.cells[1].textContent = price.toFixed(2);

      total += price;
      document.querySelector('[data-ns-test="grandTotal"]').textContent = total.toFixed(2);

      document.getElementById('item-name-input').value = '';
      document.getElementById('item-price-input').value = '';
    }
  </script>

</body>
</html>
