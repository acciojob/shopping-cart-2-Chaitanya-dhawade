<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping Cart</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 2rem; }
    .container { background: #fff; border-radius: 10px; padding: 2rem; width: 100%; max-width: 560px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.5rem; color: #1a1a1a; }
    .input-row { display: flex; gap: 10px; margin-bottom: 0.5rem; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 13px; color: #555; }
    input[type="text"], input[type="number"] {
      height: 36px; padding: 0 10px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 14px; color: #1a1a1a; outline: none;
    }
    input[type="text"]:focus, input[type="number"]:focus { border-color: #888; }
    #item-name-input { width: 200px; }
    #item-price-input { width: 110px; }
    button {
      height: 36px; padding: 0 18px; background: #1a1a1a; color: #fff;
      border: none; border-radius: 6px; font-size: 14px; cursor: pointer;
    }
    button:hover { background: #333; }
    button:active { transform: scale(0.98); }
    .error { font-size: 12px; color: #c0392b; min-height: 18px; margin-bottom: 0.75rem; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead th {
      text-align: left; padding: 8px 10px; font-size: 12px;
      color: #888; border-bottom: 1px solid #eee;
    }
    tbody td { padding: 10px 10px; color: #1a1a1a; border-bottom: 1px solid #f0f0f0; }
    th:last-child, td:last-child { text-align: right; }
    .total-row {
      display: flex; justify-content: flex-end; align-items: center;
      gap: 12px; margin-top: 14px; padding-top: 12px; border-top: 1px solid #eee;
    }
    .total-label { font-size: 14px; font-weight: 500; color: #555; }
    .total-value { font-size: 20px; font-weight: 600; color: #1a1a1a; }
    .empty-msg { color: #aaa; font-size: 13px; padding: 12px 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Shopping Cart</h1>
    <div class="input-row">
      <div class="field">
        <label for="item-name-input">Item name</label>
        <input type="text" id="item-name-input" placeholder="e.g. Apples" />
      </div>
      <div class="field">
        <label for="item-price-input">Price</label>
        <input type="number" id="item-price-input" placeholder="0.00" min="0" step="0.01" />
      </div>
      <button id="add-btn">Add</button>
    </div>
    <div class="error" id="error-msg"></div>
    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody id="item-tbody"></tbody>
    </table>
    <div class="total-row">
      <span class="total-label">Grand Total</span>
      <span class="total-value" data-ns-test="grandTotal">0</span>
    </div>
  </div>

  <script>
    const items = [];

    function renderTable() {
      const tbody = document.getElementById('item-tbody');
      tbody.innerHTML = '';

      if (items.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="2" class="empty-msg">No items yet.</td>';
        tbody.appendChild(tr);
      } else {
        items.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td data-ns-test="item-name">${item.name}</td>
            <td data-ns-test="item-price">${item.price.toFixed(2)}</td>
          `;
          tbody.appendChild(tr);
        });
      }

      const total = items.reduce((sum, i) => sum + i.price, 0);
      document.querySelector('[data-ns-test="grandTotal"]').textContent = total.toFixed(2);
    }

    renderTable();

    function addItem() {
      const nameInput = document.getElementById('item-name-input');
      const priceInput = document.getElementById('item-price-input');
      const errorMsg = document.getElementById('error-msg');
      const name = nameInput.value.trim();
      const price = parseFloat(priceInput.value);

      errorMsg.textContent = '';

      if (!name) {
        errorMsg.textContent = 'Please enter a valid item name.';
        return;
      }
      if (priceInput.value.trim() === '' || isNaN(price) || price < 0) {
        errorMsg.textContent = 'Please enter a valid price (0 or more).';
        return;
      }

      items.push({ name, price });
      nameInput.value = '';
      priceInput.value = '';
      renderTable();
    }

    document.getElementById('add-btn').addEventListener('click', addItem);
    document.getElementById('item-name-input').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
    document.getElementById('item-price-input').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
  </script>
</body>
</html>
